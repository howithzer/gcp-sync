apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: gcp-scaler-group1
  namespace: default
spec:
  scaleTargetRef:
    name: gcp-consumer-group1

  pollingInterval: 10
  cooldownPeriod:  60
  minReplicaCount: 0
  maxReplicaCount: 20

  # The Lambda pipeline dynamically patches this triggers array
  # with the current ACTIVE subscriptions for group1.
  triggers:
    - type: gcp-pubsub
      metadata:
        subscriptionName: "placeholder-replace-on-first-run"
        subscriptionSize: "5"
      authenticationRef:
        name: gcp-keda-trigger-auth
